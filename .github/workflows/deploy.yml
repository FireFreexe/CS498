name: Deploy Unity WebGL

# Trigger the action only when changes are pushed to the main branch
on:
  push:
    branches:
      - main
    paths:
      - 'Build/**' # Optional: Only triggers if files in the Build folder actually changed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Server via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          # The trailing slash on Build/ is critical. It copies the CONTENTS of the folder, not the folder itself.
          SOURCE: "Build/" 
          TARGET: "/var/www/paper.freexe.net/"
          # -avz: Archive, verbose, compress
          # --delete: Removes files on the server that are no longer in your GitHub Build folder
          # --exclude: Protects your .htaccess file from being deleted or overwritten
          ARGS: "-avz --delete --exclude='.htaccess'"
